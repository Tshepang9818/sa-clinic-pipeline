services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app-dev:
    build: ./app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ENVIRONMENT=development
    depends_on: [postgres, redis]
    ports:
      - "8010:8000"
    restart: on-failure
    profiles: [dev]

  app-staging:
    build: ./app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ENVIRONMENT=staging
    depends_on: [postgres, redis]
    ports:
      - "8011:8000"
    restart: on-failure
    profiles: [staging]

  app-prod:
    build: ./app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ENVIRONMENT=production
    depends_on: [postgres, redis]
    ports:
      - "8012:8000"
    restart: on-failure
    profiles: [prod]

volumes:
  pgdata:
