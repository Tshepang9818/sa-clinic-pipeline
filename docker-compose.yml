version: "3.8"
services:
  postgres:
    image: postgres:15
    env_file: .env
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: ./app
    env_file: .env
    depends_on: [postgres, redis]
    ports:
      - "8002:8000"
    restart: on-failure

volumes:
  pgdata:
