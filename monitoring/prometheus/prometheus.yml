global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "clinic-api-dev"
    static_configs:
      - targets: ["172.17.0.1:8010"]
    metrics_path: /metrics

  - job_name: "clinic-api-staging"
    static_configs:
      - targets: ["172.17.0.1:8011"]
    metrics_path: /metrics

  - job_name: "clinic-api-prod"
    static_configs:
      - targets: ["172.17.0.1:8012"]
    metrics_path: /metrics
