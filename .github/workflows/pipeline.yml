name: SA Clinic Pipeline — Dev → Staging → Prod

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_to_prod:
        description: 'Type YES to deploy to production'
        required: true
        default: 'NO'

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn psycopg2-binary redis \
          pytest httpx prometheus-fastapi-instrumentator pydantic

      - name: Run unit tests
        run: |
          cd app
          pytest test_main.py -v

  build:
    name: Build and push Docker image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sa-clinic-api:staging

      - name: Build and push prod image
        if: github.event.inputs.deploy_to_prod == 'YES'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sa-clinic-api:production

  deploy-staging:
    name: Deploy to staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      - name: Export environment variables
        run: |
          echo "POSTGRES_USER=clinicuser" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=clinicpass123" >> $GITHUB_ENV
          echo "POSTGRES_DB=clinicdb" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://clinicuser:clinicpass123@postgres/clinicdb" >> $GITHUB_ENV
          echo "REDIS_URL=redis://redis:6379" >> $GITHUB_ENV

      - name: Start staging environment
        run: |
          docker compose --profile staging up -d --build
          echo "Staging started on port 8011"

      - name: Wait for staging to be ready
        run: sleep 30

      - name: Run smoke test on staging
        run: |
          chmod +x app/smoke_test.sh
          ./app/smoke_test.sh http://localhost:8011

  deploy-prod:
    name: Deploy to production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.deploy_to_prod == 'YES'
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      - name: Export environment variables
        run: |
          echo "POSTGRES_USER=clinicuser" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=clinicpass123" >> $GITHUB_ENV
          echo "POSTGRES_DB=clinicdb" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://clinicuser:clinicpass123@postgres/clinicdb" >> $GITHUB_ENV
          echo "REDIS_URL=redis://redis:6379" >> $GITHUB_ENV

      - name: Start production environment
        run: |
          docker compose --profile prod up -d --build
          echo "Production started on port 8012"

      - name: Wait for production to be ready
        run: sleep 30

      - name: Run smoke test on production
        run: |
          chmod +x app/smoke_test.sh
          ./app/smoke_test.sh http://localhost:8012

      - name: Confirm production deployment
        run: |
          echo "Production deployment successful"
          echo "Deployed at $(date)"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/sa-clinic-api:production"
